<style>
.jh *{box-sizing:border-box;margin:0;padding:0}
.jh{--ac:#e8383e;--dk:#171927;--tx:#1e1e1e;--t2:#555;--bd:#e5e5e5;font-family:inherit;color:var(--tx);line-height:1.55;-webkit-text-size-adjust:100%}

.jh-hero{padding:48px 0 44px;position:relative}
.jh-kicker{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);margin-bottom:24px}
.jh-hero h1{font-weight:300;font-size:clamp(26px,7vw,34px);line-height:1.08;letter-spacing:-0.03em;margin-bottom:20px}
.jh-hero h1 em{font-style:italic;font-weight:600;color:var(--ac)}
.jh-hero__lead{font-size:15px;line-height:1.65;color:var(--t2);margin-bottom:28px;max-width:560px}

.jh-hero__actions{display:flex;flex-direction:column;gap:10px}
.jh-cta{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 24px;background:var(--ac);color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;min-height:54px;width:100%;-webkit-tap-highlight-color:transparent;text-decoration:none}
.jh-cta:hover{opacity:.92}
.jh-cta:active{opacity:.85}
.jh-cta:focus-visible{outline:2px solid var(--tx);outline-offset:3px}
.jh-cta--outline{background:transparent;border:1px solid var(--bd);color:var(--tx)}
.jh-cta--outline:hover{border-color:var(--tx);opacity:1}

.jh-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);margin-top:32px}
.jh-stat{background:#fff;padding:20px 14px;text-align:center}
.jh-stat__n{font-size:24px;font-weight:300;line-height:1;color:var(--ac);margin-bottom:5px;font-variant-numeric:tabular-nums}
.jh-stat__l{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#999}

@media(min-width:480px){
.jh-stat{padding:18px 14px}
.jh-stat__n{font-size:26px}
.jh-stat__l{font-size:10px}
}
@media(min-width:768px){
.jh-hero{padding:64px 0 52px}
.jh-hero h1{font-size:clamp(40px,5vw,60px)}
.jh-hero__lead{font-size:18px}
.jh-hero__actions{flex-direction:row}
.jh-cta{display:inline-flex;width:auto;padding:16px 32px}
.jh-stats{margin-top:48px}
.jh-stat{padding:24px 20px}
.jh-stat__n{font-size:34px}
.jh-stat__l{font-size:11px}
}
</style>

<div class="jh">
  <div class="jh-hero">
    <div class="jh-kicker">Oportunidades · Douro</div>
    <h1>Encontra o teu lugar<br>no <em>Douro</em>.</h1>
    <p class="jh-hero__lead">Vagas reais de empresas da região. Cozinha, turismo, gestão, tecnologia — o talento local merece oportunidades locais.</p>

    <div class="jh-hero__actions">
      <a href="#vagas" class="jh-cta">Ver vagas disponíveis &rarr;</a>
      <a href="/submeter-vaga" class="jh-cta jh-cta--outline">Publicar uma vaga</a>
    </div>

    <div class="jh-stats">
      <div class="jh-stat"><div class="jh-stat__n">80%</div><div class="jh-stat__l">Empregabilidade</div></div>
      <div class="jh-stat"><div class="jh-stat__n">50+</div><div class="jh-stat__l">Parceiros</div></div>
      <div class="jh-stat"><div class="jh-stat__n">Douro</div><div class="jh-stat__l">Região</div></div>
    </div>
  </div>
</div>
