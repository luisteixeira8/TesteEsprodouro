<style>
.espro-cal *{box-sizing:border-box;margin:0;padding:0}
.espro-cal{--ac:#e8383e;--dk:#171927;--tx:#1e1e1e;--t2:#555;--bd:#e5e5e5;font-family:inherit;color:var(--tx);line-height:1.55;-webkit-text-size-adjust:100%}

.espro-cal__head{padding:20px 0 16px}
.espro-cal__eyebrow{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--ac);margin-bottom:10px}
.espro-cal__head h2{font-weight:300;font-size:24px;line-height:1.1;letter-spacing:-0.03em}
.espro-cal__head h2 em{font-style:italic;font-weight:600;color:var(--ac)}

.espro-cal__dl{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;min-height:50px;padding:14px 20px;margin-top:16px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border:2px solid var(--ac);border-radius:10px;background:transparent;color:var(--ac);cursor:pointer;text-decoration:none;line-height:1;-webkit-tap-highlight-color:transparent;transition:background .2s,color .2s,box-shadow .2s}
.espro-cal__dl:hover{background:var(--ac);color:#fff;box-shadow:0 4px 14px rgba(232,56,62,.25)}
.espro-cal__dl:active{background:#cf2f34;border-color:#cf2f34;color:#fff;box-shadow:none}
.espro-cal__dl svg{width:18px;height:18px;flex-shrink:0}

.espro-cal__frame{border:1px solid var(--bd);border-radius:10px;overflow:hidden;background:#f4f4f4;margin-top:16px}
.espro-cal__frame iframe{width:100%;height:60vh;min-height:340px;border:0;display:block}

.espro-cal__hint{display:block;margin-top:10px;font-size:12px;color:var(--t2);text-align:center}
.espro-cal__hint a{color:var(--ac);text-decoration:none;font-weight:600}
.espro-cal__hint a:active{text-decoration:underline}

@media(min-width:768px){
  .espro-cal{display:grid;grid-template-columns:1fr auto;grid-template-rows:auto 1fr;gap:0 24px;align-items:end}
  .espro-cal__head{grid-column:1;grid-row:1;padding:44px 0 24px}
  .espro-cal__head h2{font-size:clamp(30px,4vw,42px)}
  .espro-cal__eyebrow{font-size:11px;margin-bottom:14px}
  .espro-cal__dl{grid-column:2;grid-row:1;width:auto;min-height:46px;padding:12px 24px;margin:0 0 24px;font-size:12px;border-radius:8px;align-self:end}
  .espro-cal__dl:hover{background:#cf2f34}
  .espro-cal__frame{grid-column:1/-1;grid-row:2;margin-top:0;border-radius:12px}
  .espro-cal__frame iframe{height:700px;min-height:500px}
  .espro-cal__hint{display:none}
}
</style>

<div class="espro-cal">
  <div class="espro-cal__head">
    <div class="espro-cal__eyebrow">Ano letivo 2025 / 2026</div>
    <h2>Calendário <em>Escolar</em></h2>
  </div>

  <div class="espro-cal__frame">
    <iframe src="https://esprodouro.com/wp-content/uploads/2025/09/Calendario-Escolar-2025_2026-Partilhado-2.pdf" title="Calendário Escolar 2025/2026"></iframe>
  </div>

  <a class="espro-cal__dl" href="https://esprodouro.com/wp-content/uploads/2025/09/Calendario-Escolar-2025_2026-Partilhado-2.pdf" download><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Transferir PDF</a>

  <span class="espro-cal__hint">Não consegues ver? <a href="https://esprodouro.com/wp-content/uploads/2025/09/Calendario-Escolar-2025_2026-Partilhado-2.pdf" target="_blank" rel="noopener">Abre o PDF diretamente</a></span>
</div>
